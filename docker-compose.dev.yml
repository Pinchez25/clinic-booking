name: clinic

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinic
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clinic -d clinic" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    command: >
      sh -c "/app/.venv/bin/python manage.py migrate &&
             /app/.venv/bin/python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://clinic:postgres@db:5432/clinic
      DJANGO_SETTINGS_MODULE: clinic.settings.development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
