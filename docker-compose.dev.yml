services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-clinic}
      POSTGRES_USER: ${DB_USER:-clinic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clinic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: builder          # Use builder stage — has dev deps, fast rebuilds
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app                 # Mount source for hot reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: clinic.settings.development
      DB_HOST: db              # Override to use Docker service name
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
