name: CI / Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: clinic_test
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U clinic -d clinic_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: clinic.settings.development
      SECRET_KEY: ci-secret-key-not-for-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://clinic:clinic@localhost:5432/clinic_test

      DB_NAME: clinic_test
      DB_USER: clinic
      DB_PASSWORD: clinic
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest --cov --cov-report=term-missing

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: ci

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          response=$(curl --fail --silent --show-error "$RENDER_DEPLOY_HOOK_URL")
          echo "$response"
