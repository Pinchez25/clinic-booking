services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-clinic}
      POSTGRES_USER: ${DB_USER:-clinic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clinic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clinic}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
